<!DOCTYPE html>
<html lang="ne" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>बारेमा — प्रतीक साहित्य संग्रह</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/about.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@400;600;700&family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button class="icon-btn back-btn" onclick="history.back()">
      ← <span style="font-size:13px;">फर्कनुस्</span>
    </button>
  </div>
  <div class="header-left">
    <div class="logo-text">
      <span class="logo-main">बारेमा</span>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="themeBtn">🌙</button>
  </div>
</header>

<!-- HERO PHOTO SECTION -->
<section class="about-hero" id="aboutHero">
  <div class="about-hero-bg" id="aboutHeroBg"></div>
  <div class="about-hero-overlay"></div>
  <div class="about-hero-content">
    <div class="about-hero-quote" id="aboutQuote"></div>
    <div class="about-hero-quote-author" id="aboutQuoteAuthor"></div>
    <h1 class="about-hero-name" id="aboutName"></h1>
    <div class="about-hero-meta">
      <span id="aboutSubtitle"></span>
      <span class="about-dot">•</span>
      <span id="aboutLocation">📍 </span>
    </div>
  </div>
</section>

<!-- STATS SECTION -->
<section class="about-stats" id="aboutStats">
  <!-- Filled by JS -->
</section>

<!-- BIO SECTION -->
<section class="about-section">
  <div class="about-section-label">📖 परिचय</div>
  <div class="about-bio" id="aboutBio"></div>
</section>

<!-- MILESTONES -->
<section class="about-section">
  <div class="about-section-label">🏆 यात्रा</div>
  <div class="about-timeline" id="aboutTimeline"></div>
</section>

<!-- CONTACT -->
<section class="about-section about-contact-section">
  <div class="about-section-label">📬 सम्पर्क</div>
  <div class="about-contact" id="aboutContact"></div>
</section>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='index.html'">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">गृहपृष्ठ</span>
  </button>
  <button class="nav-item" onclick="location.href='index.html#bookmarks'">
    <span class="nav-icon">🔖</span>
    <span class="nav-label">सेभ</span>
  </button>
  <button class="nav-item" onclick="location.href='index.html#random'">
    <span class="nav-icon">🎲</span>
    <span class="nav-label">अनियमित</span>
  </button>
  <button class="nav-item active">
    <span class="nav-icon">👤</span>
    <span class="nav-label">बारेमा</span>
  </button>
</nav>

<script src="data/kavita.js"></script>
<script src="data/about.js"></script>
<script src="js/theme.js"></script>
<script src="js/about.js"></script>
</body>
</html>
